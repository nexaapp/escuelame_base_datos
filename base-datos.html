<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Escuela M.E.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow-y:auto}
#sidebar-top{padding:16px;border-bottom:1px solid #e2e8f0}
#sidebar-top h1{font-size:15px;font-weight:700;color:#1a202c}
#sidebar-top p{font-size:11px;color:#718096;margin-top:2px}
#nav{flex:1;padding:8px 0;overflow-y:auto}
.year-btn{width:100%;text-align:left;background:none;border:none;padding:8px 16px;font-size:13px;font-weight:600;color:#2d3748;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent}
.year-btn:hover{background:#f7fafc}
.year-btn.active{color:#2b6cb0;background:#ebf4ff;border-left-color:#3182ce}
.months-list{padding:2px 0 4px 20px}
.month-btn{width:100%;text-align:left;background:none;border:none;padding:5px 12px;font-size:12px;color:#4a5568;cursor:pointer;border-radius:4px}
.month-btn:hover{background:#f7fafc}
.month-btn.active{background:#ebf4ff;color:#2b6cb0;font-weight:600}
.add-year-btn{width:100%;text-align:left;background:none;border:none;padding:8px 16px;font-size:12px;color:#718096;cursor:pointer}
.add-year-btn:hover{color:#2b6cb0}
.pro-sep{padding:14px 16px 4px;font-size:10px;font-weight:700;letter-spacing:.1em;color:#9a7ec8;text-transform:uppercase;border-top:1px solid #f0ebff;margin-top:8px}
.pro-year-btn{border-left-color:#c8b8ef!important}
.pro-year-btn.active{color:#6b21a8!important;background:#f5f3ff!important;border-left-color:#7c3aed!important}
#sidebar-bot{padding:8px;border-top:1px solid #e2e8f0}
.db-btn{width:100%;padding:8px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;background:#2b6cb0;color:#fff}
.db-btn.off{background:#f0f4f8;color:#4a5568}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:12px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:12px}
#breadcrumb{font-size:14px;color:#4a5568;flex:1}
.search-box{padding:6px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;width:200px}
#stats{display:flex;gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid #e2e8f0;flex-wrap:wrap}
.stat{background:#f7fafc;border-radius:8px;padding:10px 16px;min-width:120px}
.stat-l{font-size:11px;color:#718096;margin-bottom:2px}
.stat-v{font-size:18px;font-weight:700;color:#2d3748}
#content{flex:1;overflow-y:auto;padding:16px 20px}
.course-card{background:#fff;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
.ch{padding:12px 16px;display:flex;align-items:center;cursor:pointer;gap:10px}
.ch-blue{background:#e8f1fb}.ch-green{background:#eaf3e2}.ch-amber{background:#fef3e2}
.ch-pink{background:#fceaf1}.ch-purple{background:#eeedf8}.ch-teal{background:#e2f4ef}.ch-gray{background:#f2f0ea}
.course-name{font-size:14px;font-weight:700;color:#2d3748}
.course-sub{font-size:12px;color:#718096;margin-top:2px}
.course-sub.ph{color:#b0bac9;font-style:italic}
.ch-meta{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.pill-blue{background:#bee3f8;color:#1a365d}.pill-green{background:#c6f6d5;color:#1c4532}
.pill-amber{background:#fefcbf;color:#744210}.pill-pink{background:#fed7e2;color:#702459}
.pill-purple{background:#e9d8fd;color:#44337a}.pill-teal{background:#b2f5ea;color:#234e52}.pill-gray{background:#e2e8f0;color:#4a5568}
.eur-lbl{font-size:12px;color:#718096;font-weight:600}
.icon-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 4px}
.add-course-card{background:none;border:2px dashed #cbd5e0;border-radius:10px;padding:14px;text-align:center;font-size:13px;color:#718096;cursor:pointer;margin-bottom:12px}
.add-course-card:hover{border-color:#90cdf4;color:#2b6cb0}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f7fafc;padding:8px 10px;text-align:left;font-weight:600;color:#4a5568;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f0f4f8;vertical-align:top;white-space:nowrap}
tr:hover td{background:#fafbfc}
.totals-row td{background:#f7fafc!important;font-weight:600;border-top:2px solid #e2e8f0}
.empty-row td{color:#a0aec0;text-align:center;padding:16px}
.mail-link{color:#2b6cb0;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.obs-td{max-width:160px;overflow:hidden;text-overflow:ellipsis;color:#718096;cursor:pointer}
.add-row{width:100%;padding:8px;background:#f7fafc;border:none;border-top:1px solid #e2e8f0;color:#4a5568;font-size:12px;cursor:pointer;text-align:left}
.add-row:hover{background:#ebf4ff;color:#2b6cb0}
.pago-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.pp{background:#fde8e8;color:#9b1c1c}.pe{background:#def7ec;color:#14532d}
.pt{background:#e1effe;color:#1e3a5f}.ptr{background:#f3e8ff;color:#4c1d95}.preg{background:#fce7f3;color:#831843}
.period-tag{background:#e2e8f0;color:#4a5568;padding:2px 7px;border-radius:10px;font-size:11px}
.tbl-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 3px;opacity:.6}
.tbl-btn:hover{opacity:1}
.tbl-btn.del{color:#c53030}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:12px;width:90%;max-width:540px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.modal-hdr h2{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#718096}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-body label{display:block;font-size:12px;font-weight:600;color:#4a5568;margin-bottom:4px;margin-top:10px}
.modal-body label:first-child{margin-top:0}
.modal-body input,.modal-body select,.modal-body textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{border-color:#3182ce}
.modal-body textarea{height:70px;resize:vertical}
.modal-ctx{font-size:12px;color:#718096;background:#f7fafc;padding:6px 10px;border-radius:6px;margin-bottom:8px}
.modal-ftr{padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.btn{padding:8px 20px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary{background:#2b6cb0;color:#fff}.btn-primary:hover{background:#2c5282}
.btn-danger{background:none;border:1px solid #c53030;color:#c53030;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer}
.turno-btns{display:flex;gap:10px;margin-bottom:8px}
.turno-btn{flex:1;padding:10px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;text-align:center;font-size:13px;background:#fff;transition:all .15s}
.turno-btn.am.sel{border-color:#d97706;background:#fffbeb}
.turno-btn.pm.sel{border-color:#7c3aed;background:#f5f3ff}
.db-section{background:#fff;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
.db-hdr{padding:12px 16px;display:flex;align-items:center;cursor:pointer;gap:10px}
.db-hdr:hover{background:#fafbfc}
.db-left{display:flex;align-items:center;gap:10px;flex:1}
.db-name{font-size:14px;font-weight:700;color:#2d3748}
.db-count{font-size:12px;color:#718096}
.db-eur{font-size:13px;font-weight:600;color:#4a5568}
.db-arr{margin-left:auto;color:#a0aec0}
.no-results{text-align:center;padding:40px;color:#a0aec0}
.detail-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.detail-box{background:#fff;border-radius:12px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative}
.detail-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#718096}
.detail-row{display:flex;margin-bottom:10px;gap:8px}
.detail-row .lbl{font-size:11px;font-weight:600;color:#718096;width:90px;flex-shrink:0;padding-top:2px}
.detail-row .val{font-size:13px;color:#2d3748;flex:1;word-break:break-word;white-space:normal}
.color-sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.color-sw.sel{border-color:#2d3748}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0}

.add-month-btn{width:100%;text-align:left;background:none;border:none;padding:4px 16px 4px 28px;font-size:11px;color:#7c5cbf;cursor:pointer;border-radius:4px;}
.add-month-btn:hover{background:#f0ebff;}
.pro-sep{padding:16px 16px 4px;font-size:10px;font-weight:700;letter-spacing:.08em;color:#9a7ec8;text-transform:uppercase;}
.pro-year{border-left:3px solid #c8b8ef !important;}
.pro-year.active{background:linear-gradient(90deg,#f0ebff,#f8f5ff) !important;border-left-color:#7c5cbf !important;}
.turno-btns{display:flex;gap:10px;margin-bottom:10px;}
.turno-btn{flex:1;padding:9px;border:2px solid #e5e7eb;border-radius:8px;background:white;cursor:pointer;font-size:14px;transition:all .15s;}
.turno-btn.am.sel{border-color:#d97706;background:#fffbeb;}
.turno-btn.pm.sel{border-color:#7c3aed;background:#f5f3ff;}
.det-row{display:flex;gap:12px;padding:8px 4px;border-bottom:1px solid #f0ede6;}
.det-lbl{width:130px;flex-shrink:0;color:#888;font-size:12px;font-weight:500;padding-top:2px;}
.det-val{flex:1;word-break:break-word;}
#detail-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
#detail-box{background:white;border-radius:14px;padding:22px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;position:relative;}
.detail-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:#888;}
.btn-danger{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;}
.btn-danger:hover{background:#fca5a5;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;opacity:.7;}
.icon-btn:hover{opacity:1;background:#f0ede6;}
.obs-td{color:#aaa;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.no-results{padding:40px;text-align:center;color:#aaa;font-size:15px;}
.per-tag{background:#e8f1fb;color:#3a6abf;padding:2px 7px;border-radius:10px;font-size:11px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
table tbody tr:hover{background:#f8f6f2;}



#mobile-topnav{display:none}
@media(max-width:700px){
  #sidebar{display:none}
  #main{width:100%;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#f4f6f9}
  #topbar{padding:8px 10px;gap:6px;min-height:44px}
  #breadcrumb{display:none}
  #mobile-topnav{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0}
  #mobile-topnav select{flex:1;padding:7px 8px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:#f9fafb;color:#1a202c;max-width:48%}
  #mn-db-btn{padding:7px 10px;background:#f0f4ff;border:1px solid #c3dafe;border-radius:8px;font-size:13px;color:#3182ce;cursor:pointer}
  #mn-db-btn.active{background:#3182ce;color:#fff}
  #stats{flex-wrap:wrap;gap:6px;padding:8px 10px;flex-shrink:0}
  .stat{min-width:130px;flex:1}
  #content{flex:1;overflow-y:auto;padding:8px 10px;background:#f4f6f9;min-height:0}
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{font-size:11px;min-width:520px}
  table th,table td{padding:5px 6px;white-space:nowrap}
  .modal-box{width:95vw;max-width:95vw;max-height:88vh}
  .detail-box{width:92vw;max-width:92vw;padding:14px}
  .tbl-btn,.icon-btn{font-size:15px;padding:4px 6px}
  .top-btn{font-size:11px;padding:4px 8px}
  .course-card{margin-bottom:10px}
}
.cloud-status{font-size:11px;padding:3px 8px;border-radius:10px;white-space:nowrap}
.cloud-status.ok{background:#d1fae5;color:#065f46}
.cloud-status.warn{background:#fef3c7;color:#92400e}
.cloud-status.err{background:#fee2e2;color:#991b1b}
.top-btn{padding:5px 11px;border:1px solid #d1d5db;border-radius:6px;background:white;cursor:pointer;font-size:12px;color:#374151;white-space:nowrap}

#app-topnav{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:#fff;border-bottom:1px solid #f0f0f0;
  display:flex;align-items:center;padding:0 16px;gap:10px;z-index:9999;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
#app-topnav .tn-back{background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:0 4px;line-height:1;transition:color .15s}
#app-topnav .tn-back:hover{color:#1a1a1a}
#app-topnav .tn-logo{width:26px;height:26px;border-radius:50%;object-fit:cover}
#app-topnav .tn-title{font-size:13px;font-weight:700;color:#1a1a1a;flex:1}
body{padding-top:50px!important}
</style>
</head>

function sc(l,v){return '<div class="stat"><div class="stat-l">'+l+'</div><div class="stat-v">'+v+'</div></div>';}
function gM(y,m){return (MC[y]&&MC[y][m])||[];}
function gS(y,m,cid){return (ST[y]&&ST[y][m]&&ST[y][m][cid])||[];}
function getColor(){const s=document.querySelector('.color-sw.sel');return s?{cls:s.dataset.cls,pill:s.dataset.pill}:{cls:'ch-blue',pill:'pill-blue'};}
function selSwatch(el){document.querySelectorAll('.color-sw').forEach(function(s){s.classList.remove('sel');});el.classList.add('sel');}
function selTurno(t){
  document.getElementById('btn-am').classList.toggle('sel',t==='am');
  document.getElementById('btn-pm').classList.toggle('sel',t==='pm');
}

// ── PRO helpers ───────────────────────────────────────────────────────────────
function proMonths(students){
  var s=new Set();
  students.forEach(function(st){if(st.pm)Object.keys(st.pm).forEach(function(k){s.add(k);});});
  return MO_ORDER.filter(function(k){return s.has(k);});
}

// ── PRO table ─────────────────────────────────────────────────────────────────
function tblProHTML(students,cid,pk){
  var mos=proMonths(students);
  var cols=['Nombre','Apellidos','Tel','Mail','Localidad','Matrícula','Turno','Cuota/mes','Pago'].concat(mos).concat(['Total pagado','Obs','']);
  var totMa=0,totP=0,totPagado=0;
  var moTot={};
  var rows=students.length?students.map(function(s,i){
    totMa+=s.ma||0;
    if(s.p==='Pendiente')totP+=s.ma||0;
    var rowPag=0;
    var moCells=mos.map(function(mo){
      var v=(s.pm||{})[mo];
      if(v){moTot[mo]=(moTot[mo]||0)+v;rowPag+=v;}
      return '<td style="text-align:center;white-space:nowrap">'+(v?v+'€':'<span style="color:#ddd">—</span>')+'</td>';
    }).join('');
    totPagado+=rowPag;
    return '<tr onclick="showDetailPro(this)" style="cursor:pointer" data-json=\''+escJson(Object.assign({},s,{_pk:pk,_cid:cid,_i:i}))+'\'>' +
      '<td>'+esc(s.n)+'</td><td>'+esc(s.ap)+'</td>' +
      '<td style="white-space:nowrap">'+esc(s.t)+'</td>' +
      '<td class="mail-link">'+esc(s.m)+'</td>' +
      '<td>'+esc(s.l)+'</td>' +
      '<td><strong>'+(s.ma||0)+'€</strong></td>' +
      '<td style="white-space:nowrap">'+(s.tu==='Mañana'?'☀ Mañana':s.tu==='Tarde'?'🌙 Tarde':'—')+'</td>' +
      '<td>'+(s.cu||'—')+'</td>' +
      '<td>'+pTag(s.p)+'</td>' +
      moCells +
      '<td style="text-align:center;font-weight:600;color:#2a7a3a">'+(rowPag?rowPag+'€':'—')+'</td>' +
      '<td class="obs-td" title="'+esc(s.o)+'">'+esc(s.o)+'</td>' +
      '<td style="white-space:nowrap">' +
        '<span class="tbl-btn" onclick="event.stopPropagation();editPS(event,\''+pk+'\',\''+cid+'\','+i+')">✏️</span>' +
        '<span class="tbl-btn del" onclick="event.stopPropagation();delPS(\''+pk+'\',\''+cid+'\','+i+')">🗑</span>' +
      '</td></tr>';
  }).join(''):'<tr class="empty-row"><td colspan="'+cols.length+'">Sin alumnos</td></tr>';
  var moTotCells=mos.map(function(mo){return '<td style="text-align:center;font-weight:700">'+(moTot[mo]||0)+'€</td>';}).join('');
  var tot=students.length?
    '<tr class="totals-row">' +
      '<td colspan="5" style="text-align:right;font-weight:600">Total:</td>' +
      '<td><strong>'+totMa+'€</strong></td><td></td><td></td>' +
      '<td>'+(totP>0?'<span style="color:#b03020">'+totP+'€ pdte</span>':'<span style="color:#2a7a3a">✓</span>')+'</td>' +
      moTotCells +
      '<td style="text-align:center;font-weight:700;color:#2a7a3a">'+totPagado+'€</td>' +
      '<td colspan="2"></td>' +
    '</tr>':'';
  var heads=cols.map(function(c){return '<th>'+c+'</th>';}).join('');
  return '<div class="tbl-wrap"><table><thead><tr>'+heads+'</tr></thead><tbody>'+rows+tot+'</tbody></table></div>';
}

// ── Regular table ─────────────────────────────────────────────────────────────
function tblHTML(students,showPer,editable,y,m,cid){
  var cols=(showPer?['Período']:[]). concat(['Nombre','Apellidos','Tel','Mail','Localidad','Importe','Pago','Obs',editable?'':'']);
  var totI=0,totP=0;
  var rows=students.length?students.map(function(s,i){
    totI+=s.i||0;
    if(s.p==='Pendiente')totP+=s.i||0;
    var perCell=showPer?'<td><span class="per-tag">'+esc(s._per||'')+'</span></td>':'';
    var actions=editable?
      '<td style="white-space:nowrap"><span class="tbl-btn" onclick="event.stopPropagation();editS('+y+',\''+m+'\',\''+cid+'\','+i+')">✏️</span>'+
      '<span class="tbl-btn del" onclick="event.stopPropagation();delS('+y+',\''+m+'\',\''+cid+'\','+i+')">🗑</span></td>':
      '<td></td>';
    return '<tr onclick="showDetail(this)" style="cursor:pointer" data-json=\''+escJson(Object.assign({},s,{_editable:editable,_y:y,_m:m,_cid:cid,_i:i}))+'\'>'+
      perCell+
      '<td>'+esc(s.n)+'</td><td>'+esc(s.ap)+'</td>' +
      '<td style="white-space:nowrap">'+esc(s.t)+'</td>' +
      '<td class="mail-link">'+esc(s.m)+'</td>' +
      '<td>'+esc(s.l)+'</td>' +
      '<td>'+(s.i||0)+'€</td>' +
      '<td>'+pTag(s.p)+'</td>' +
      '<td class="obs-td" title="'+esc(s.o)+'">'+esc(s.o)+'</td>' +
      actions+'</tr>';
  }).join(''):'<tr class="empty-row"><td colspan="'+cols.length+'">Sin alumnos</td></tr>';
  var tot=students.length&&editable?
    '<tr class="totals-row">'+(showPer?'<td></td>':'')+
    '<td colspan="4" style="text-align:right">Total:</td>' +
    '<td colspan="1"></td>' +
    '<td><strong>'+totI+'€</strong></td>' +
    '<td>'+(totP>0?'<span style="color:#b03020">'+totP+'€ pdte</span>':'<span style="color:#2a7a3a">✓</span>')+'</td>' +
    '<td colspan="2"></td></tr>':'';
  var heads=cols.map(function(c){return '<th>'+c+'</th>';}).join('');
  return '<div class="tbl-wrap"><table><thead><tr>'+heads+'</tr></thead><tbody>'+rows+tot+'</tbody></table></div>';
}

// ── Detail popups ─────────────────────────────────────────────────────────────
function showDetail(row){
  var s=JSON.parse(row.dataset.json);
  var dbox=document.getElementById('detail-box');
  var h='<button class="detail-close" onclick="document.getElementById(\'detail-ov\').style.display=\'none\'">✕</button>';
  h+='<h3 style="margin-bottom:14px;font-size:17px">'+esc(s.n)+' '+esc(s.ap)+'</h3>';
  var fields=[['Teléfono',s.t],['Mail',s.m],['Localidad',s.l],['Importe',(s.i||0)+'€'],['Estado pago',pTag(s.p)],['Observaciones',esc(s.o)]];
  if(s._per) fields.unshift(['Período',esc(s._per)]);
  fields.forEach(function(f){if(f[1])h+='<div class="det-row"><div class="det-lbl">'+f[0]+'</div><div class="det-val">'+f[1]+'</div></div>';});
  if(s._editable) h+='<div style="display:flex;gap:8px;margin-top:12px">'+
    '<button class="btn btn-primary" style="flex:1" onclick="document.getElementById(\'detail-ov\').style.display=\'none\';editS('+s._y+',\''+s._m+'\',\''+s._cid+'\','+s._i+')">✏️ Editar</button>'+
    '<button class="btn btn-danger" style="flex:1" onclick="document.getElementById(\'detail-ov\').style.display=\'none\';delS('+s._y+',\''+s._m+'\',\''+s._cid+'\','+s._i+')">🗑 Eliminar</button></div>';
  dbox.innerHTML=h;
  document.getElementById('detail-ov').style.display='flex';
}

// ── Nav ────────────────────────────────────────────────────────────────────────
function renderNav(){
  var nav=document.getElementById('nav');
  nav.innerHTML='';
  // Regular years
  YEARS.forEach(function(y){
    var yb=document.createElement('button');
    yb.className='year-btn'+(y===sY&&!showDB&&!selPro?' active':'');
    yb.innerHTML=y+'<span class="arr">'+(y===sY&&!showDB&&!selPro?'▾':'▸')+'</span>';
    yb.onclick=function(){sY=y;sM=ALL_MONTHS.find(function(m){return MC[y]&&MC[y][m];})||'Enero';selPro=null;showDB=false;render();};
    nav.appendChild(yb);
    if(y===sY&&!showDB&&!selPro){
      var ml=document.createElement('div');ml.className='months-list';
      var hasMos=ALL_MONTHS.filter(function(m){return MC[y]&&MC[y][m];});
      hasMos.forEach(function(m){
        var mb=document.createElement('button');
        mb.className='month-btn'+(m===sM?' active':'');
        mb.textContent=m;
        mb.onclick=function(){sM=m;render();};
        ml.appendChild(mb);
      });
      // Add month button
      var addMo=document.createElement('button');
      addMo.className='add-month-btn';
      addMo.textContent='+ Añadir mes';
      addMo.onclick=function(){openModal('month');};
      ml.appendChild(addMo);
      nav.appendChild(ml);
    }
  });
  // Add year button
  var addY=document.createElement('button');
  addY.className='add-year-btn';
  addY.textContent='+ Añadir año';
  addY.onclick=function(){openModal('year');};
  nav.appendChild(addY);
  // PRO separator
  var sep=document.createElement('div');sep.className='pro-sep';sep.textContent='CURSOS PROFESIONALES';
  nav.appendChild(sep);
  PRO_KEYS.forEach(function(pk){
    if(!(PC[pk]&&PC[pk].length))return;
    var pb=document.createElement('button');
    pb.className='year-btn pro-year'+(selPro===pk?' active':'');
    pb.innerHTML=pk+'<span class="arr">'+(selPro===pk?'▾':'▸')+'</span>';
    pb.onclick=function(){selPro=pk;showDB=false;render();};
    nav.appendChild(pb);
    if(selPro===pk){
      var pl=document.createElement('div');pl.className='months-list';
      (PC[pk]||[]).forEach(function(c){
        var cb=document.createElement('div');
        cb.style.cssText='padding:4px 16px 4px 28px;font-size:12px;color:#555;display:flex;align-items:center;gap:6px';
        cb.innerHTML='<span class="pill '+c.pill+'" style="font-size:10px;padding:1px 6px">&nbsp;</span>'+esc(c.label.replace('Profesional de ',''));
        pl.appendChild(cb);
      });
      nav.appendChild(pl);
    }
  });
}

// ── Month view ────────────────────────────────────────────────────────────────
function renderMonth(){
  document.getElementById('breadcrumb').innerHTML=sY+' › <strong>'+sM+'</strong>';
  var courses=gM(sY,sM);
  var allS=courses.reduce(function(a,c){return a.concat(gS(sY,sM,c.id));},[]);
  var totI=allS.reduce(function(a,s){return a+(s.i||0);},0);
  var totP=allS.filter(function(s){return s.p==='Pendiente';}).reduce(function(a,s){return a+(s.i||0);},0);
  document.getElementById('stats').innerHTML=
    sc('Alumnos',allS.length)+sc('Ingresos',totI+'€')+
    sc('Pendiente',totP>0?'<span style="color:#b03020">'+totP+'€</span>':'<span style="color:#2a7a3a">✓</span>')+
    sc('Cursos activos',courses.filter(function(c){return gS(sY,sM,c.id).length>0;}).length+'/'+courses.length);
  var cont=document.getElementById('courses');cont.innerHTML='';
  courses.forEach(function(c,idx){
    var key=sY+'_'+sM+'_'+c.id;
    if(!(key in expanded))expanded[key]=true;
    var students=gS(sY,sM,c.id);
    var eur=students.reduce(function(a,s){return a+(s.i||0);},0);
    var card=document.createElement('div');card.className='course-card';
    var hdr=document.createElement('div');hdr.className='course-header '+c.cls;
    var tb=document.createElement('div');tb.className='course-title-block';
    tb.innerHTML='<div class="course-name">'+esc(c.label)+'</div>'+
      '<div class="course-sub'+(c.subtitle?'':' placeholder')+'">'+esc(c.subtitle||'Añadir fechas y horario…')+'</div>';
    tb.onclick=function(){expanded[key]=!expanded[key];renderMonth();};
    var meta=document.createElement('div');meta.className='course-meta';
    meta.innerHTML=
      '<span class="pill '+c.pill+'">'+students.length+' alumno'+(students.length!==1?'s':'')+'</span>'+
      ' <span class="eur-lbl">'+eur+'€</span>'+
      ' <button class="icon-btn" title="Copiar emails" onclick="event.stopPropagation();copyMails('+sY+',\''+sM+'\',\''+c.id+'\')">📧</button>'+
      ' <button class="icon-btn" onclick="event.stopPropagation();openModal(\'edit-course\',{idx:'+idx+'})">✏️</button>'+
      ' <span class="ch-toggle" onclick="event.stopPropagation();expanded[\''+key+'\']=!expanded[\''+key+'\'];renderMonth()">'+(expanded[key]?'▾':'▸')+'</span>';
    hdr.appendChild(tb);hdr.appendChild(meta);card.appendChild(hdr);
    if(expanded[key]){
      var body=document.createElement('div');
      body.innerHTML=tblHTML(students,false,true,sY,sM,c.id)+
        '<button class="add-row" onclick="openModal(\'student\',{cid:\''+c.id+'\'})">+ Añadir alumno</button>';
      card.appendChild(body);
    }
    cont.appendChild(card);
  });
  var addCard=document.createElement('div');addCard.className='add-course-card';
  addCard.textContent='+ Añadir curso a '+sM+' '+sY;
  addCard.onclick=function(){openModal('course');};
  cont.appendChild(addCard);
}

function copyMails(y,m,cid){
  var mails=gS(y,m,cid).map(function(s){return s.m;}).filter(Boolean).join(', ');
  navigator.clipboard.writeText(mails).then(function(){alert('✓ Emails copiados');});
}

// ── PRO view ──────────────────────────────────────────────────────────────────

  var pk=selPro;
  document.getElementById('breadcrumb').innerHTML='<strong>'+pk+'</strong>';
  var courses=PC[pk]||[];
  var allS=courses.reduce(function(a,c){return a.concat((PS[pk]||{})[c.id]||[]);},[]);

  var totP=allS.filter(function(s){return s.p==='Pendiente';}).reduce(function(a,s){return a+(s.ma||0);},0);

  var pmN=allS.filter(function(s){return s.tu==='Tarde';}).length;

    var ss=(PS[pk]||{})[c.id]||[];
    var tot=ss.reduce(function(a,s){return a+(s.ma||0);},0);

    sc('Matrículas por curso',courseInfo)+

  var cont=document.getElementById('courses');cont.innerHTML='';
  courses.forEach(function(c){
    var students=(PS[pk]||{})[c.id]||[];
    var key=pk+'_'+c.id;
    if(!(key in expanded))expanded[key]=true;
    var amC=students.filter(function(s){return s.tu==='Mañana';}).length;
    var pmC=students.filter(function(s){return s.tu==='Tarde';}).length;
    var cTot=students.reduce(function(a,s){return a+(s.ma||0);},0);
    var card=document.createElement('div');card.className='course-card';
    var hdr=document.createElement('div');hdr.className='course-header '+c.cls;
    var tb=document.createElement('div');tb.className='course-title-block';
    tb.innerHTML='<div class="course-name">'+esc(c.label)+'</div>'+
      '<div class="course-sub">'+pk+' · Matrículas: '+cTot+'€</div>';
    tb.onclick=function(){expanded[key]=!expanded[key];renderPro();};
    var meta=document.createElement('div');meta.className='course-meta';
    meta.innerHTML=
      '<span class="pill '+c.pill+'">'+students.length+' alumno'+(students.length!==1?'s':'')+'</span>'+
      ' <span style="font-size:12px;color:#888">☀'+amC+' 🌙'+pmC+'</span>'+
      ' <button class="icon-btn" title="Copiar emails" onclick="event.stopPropagation();copyProMails(\''+pk+'\',\''+c.id+'\')">📧</button>'+
      ' <button class="icon-btn" title="Pago mensual masivo" onclick="event.stopPropagation();bulkMonthPay(\''+pk+'\',\''+c.id+'\')">💳</button>'+
      ' <span class="ch-toggle" onclick="event.stopPropagation();expanded[\''+key+'\']=!expanded[\''+key+'\'];renderPro()">'+(expanded[key]?'▾':'▸')+'</span>';
    hdr.appendChild(tb);hdr.appendChild(meta);card.appendChild(hdr);
    if(expanded[key]){
      var body=document.createElement('div');
      body.innerHTML=tblProHTML(students,c.id,pk)+
        '<button class="add-row" onclick="openModalProS(\''+pk+'\',\''+c.id+'\')">+ Añadir alumno</button>';
      card.appendChild(body);
    }

function copyProMails(pk,cid){
  var mails=(PS[pk]||{})[cid]||[];
  var txt=mails.map(function(s){return s.m;}).filter(Boolean).join(', ');
  navigator.clipboard.writeText(txt).then(function(){alert('✓ '+mails.filter(function(s){return s.m;}).length+' emails copiados');});
}

function bulkMonthPay(pk,cid){
  var mo=prompt('¿En qué mes aplicas el pago?\n(OCT NOV DIC ENE FEB MAR ABR MAY JUN JUL AGO SEP)','');
  if(!mo)return;
  var moU=mo.trim().toUpperCase();
  if(MO_ORDER.indexOf(moU)<0){alert('Mes no reconocido: '+moU);return;}
  var amount=parseInt(prompt('Importe para todos los alumnos en '+moU+' (€):','195'));
  if(isNaN(amount)||amount<=0)return;
  var ss=(PS[pk]||{})[cid]||[];
  ss.forEach(function(s){if(!s.pm)s.pm={};s.pm[moU]=amount;});
  alert('✓ '+ss.length+' alumnos actualizados: '+amount+'€ en '+moU);
  renderPro();
}

// ── Global DB view ────────────────────────────────────────────────────────────
function renderDB(){
  var q=(document.getElementById('db-search').value||'').toLowerCase().trim();
  document.getElementById('breadcrumb').innerHTML='<strong>Base de datos global</strong>';
  var map={};
  // Regular courses
  Object.keys(MC).forEach(function(y){
    Object.keys(MC[y]).forEach(function(m){
      gM(parseInt(y),m).forEach(function(c){
        if(!map[c.label])map[c.label]={cls:c.cls,pill:c.pill,students:[]};
        gS(parseInt(y),m,c.id).forEach(function(s){
          if(!q||[s.n,s.ap,s.m,s.t,s.l].join(' ').toLowerCase().includes(q))
            map[c.label].students.push(Object.assign({},s,{_per:m+' '+y}));
        });
      });
    });
  });
  var totAll=Object.values(map).reduce(function(a,v){return a+v.students.length;},0);
  document.getElementById('stats').innerHTML=sc('Total alumnos',totAll)+sc('Tipos de curso',Object.keys(map).filter(function(k){return map[k].students.length>0;}).length);
  var cont=document.getElementById('courses');cont.innerHTML='';
  var entries=Object.entries(map).filter(function(e){return e[1].students.length>0;});
  if(!entries.length){cont.innerHTML='<div class="no-results">No se encontraron resultados</div>';return;}
  entries.forEach(function(entry){
    var label=entry[0],data=entry[1];
    var key='db_'+label;
    if(!(key in dbExp))dbExp[key]=false;
    var sec=document.createElement('div');sec.className='db-section';
    var hdr=document.createElement('div');hdr.className='db-hdr';
    var eur=data.students.reduce(function(a,s){return a+(s.i||0);},0);
    hdr.innerHTML='<div class="db-left"><span class="pill '+data.pill+'" style="font-size:11px">&nbsp;</span><div><div class="db-name">'+esc(label)+'</div><div class="db-count">'+data.students.length+' alumnos · '+eur+'€</div></div></div>'+
      '<button class="icon-btn" style="margin-right:8px" title="Copiar emails" onclick="event.stopPropagation();copyDBMails(\''+encodeURIComponent(label)+'\')">📧</button>'+
      '<span class="db-arr">'+(dbExp[key]?'▾':'▸')+'</span>';
    hdr.onclick=function(){dbExp[key]=!dbExp[key];renderDB();};
    sec.appendChild(hdr);
    if(dbExp[key]){
      var body=document.createElement('div');
      body.innerHTML=tblHTML(data.students,true,false,0,'','');
      sec.appendChild(body);
    }
    cont.appendChild(sec);
  });
}

function copyDBMails(encodedLabel){
  var label=decodeURIComponent(encodedLabel);
  var all=[];
  Object.keys(MC).forEach(function(y){
    Object.keys(MC[y]).forEach(function(m){
      gM(parseInt(y),m).forEach(function(c){
        if(c.label===label) gS(parseInt(y),m,c.id).forEach(function(s){if(s.m&&all.indexOf(s.m)<0)all.push(s.m);});
      });
    });
  });
  navigator.clipboard.writeText(all.join(', ')).then(function(){alert('✓ '+all.length+' emails únicos copiados');});
}

// ── Modals ────────────────────────────────────────────────────────────────────
function closeModal(){document.getElementById('modal').style.display='none';}

function openModal(mode,extra){
  _mode=mode;_ex=extra||{};
  var title=document.getElementById('modal-title');
  var body=document.getElementById('modal-body');
  var ok=document.getElementById('modal-ok');
  var left=document.getElementById('modal-left');
  left.innerHTML='';ok.textContent='Guardar';ok.style.display='';

  if(mode==='year'){
    title.textContent='Añadir año';
    body.innerHTML='<label>Año</label><input type="number" id="m-year" value="'+(Math.max.apply(null,YEARS)+1)+'" min="2000" max="2100">';
    ok.textContent='Añadir año';
  }
  else if(mode==='month'){
    title.textContent='Añadir mes a '+sY;
    var existing=MC[sY]?Object.keys(MC[sY]):[];
    var missing=ALL_MONTHS.filter(function(m){return existing.indexOf(m)<0;});
    if(!missing.length){alert('Ya están todos los meses de '+sY);closeModal();return;}
    var opts=missing.map(function(m){return '<option>'+m+'</option>';}).join('');
    body.innerHTML='<label>Mes</label><select id="m-month">'+opts+'</select>';
    ok.textContent='Añadir mes';
  }
  else if(mode==='course'){
    var swatches=COLORS.map(function(c){return '<div class="color-sw '+c.cls+(c.cls==='ch-blue'?' sel':'')+'" style="background:'+c.bg+'" onclick="selSwatch(this)" data-cls="'+c.cls+'" data-pill="'+c.pill+'"></div>';}).join('');
    title.textContent='Nuevo curso en '+sM+' '+sY;
    body.innerHTML='<div class="modal-ctx">Solo se añade a <strong>'+sM+' '+sY+'</strong></div>'+
      '<label>Nombre del curso</label><input id="m-cl" placeholder="Ej: Iniciación a la fotografía">'+
      '<label>Color</label><div class="color-swatches">'+swatches+'</div>'+
      '<label>Subtítulo / fechas</label><textarea id="m-csub" placeholder="Ej: Del 3 al 7, 17:00-20:00h"></textarea>';
    ok.textContent='Crear curso';
  }
  else if(mode==='edit-course'){
    var c=gM(sY,sM)[_ex.idx];
    var swatches=COLORS.map(function(co){return '<div class="color-sw '+co.cls+(co.cls===c.cls?' sel':'')+'" style="background:'+co.bg+'" onclick="selSwatch(this)" data-cls="'+co.cls+'" data-pill="'+co.pill+'"></div>';}).join('');
    title.textContent='Editar curso';
    body.innerHTML='<div class="modal-ctx"><strong>'+sM+' '+sY+'</strong></div>'+
      '<label>Nombre</label><input id="m-cl" value="'+esc(c.label)+'">'+
      '<label>Color</label><div class="color-swatches">'+swatches+'</div>'+
      '<label>Subtítulo / fechas</label><textarea id="m-csub">'+esc(c.subtitle||'')+'</textarea>';
    left.innerHTML='<button class="btn-danger" onclick="delCourse('+_ex.idx+');closeModal()">Eliminar curso</button>';
  }
  else if(mode==='student'||mode==='edit-student'){
    var isEdit=mode==='edit-student';
    var s=isEdit?gS(sY,sM,_ex.cid)[_ex.idx]:null;
    var courses=gM(sY,sM);
    var opts=courses.map(function(c){return '<option value="'+c.id+'"'+((_ex.cid||'')===c.id?' selected':'')+'>'+esc(c.label)+'</option>';}).join('');
    var pagoOpts=PAGOS.map(function(p){return '<option'+(s&&s.p===p?' selected':'')+'>'+p+'</option>';}).join('');
    title.textContent=isEdit?'Editar alumno':'Añadir alumno';
    body.innerHTML=(isEdit?'<div class="modal-ctx"><strong>'+sM+' '+sY+'</strong></div>':'')+
      (!isEdit?'<label>Curso</label><select id="m-sc">'+opts+'</select>':'')+
      '<label>Nombre</label><input id="m-n" value="'+esc(s&&s.n||'')+'">'+
      '<label>Apellidos</label><input id="m-ap" value="'+esc(s&&s.ap||'')+'">'+
      '<label>Teléfono</label><input id="m-t" value="'+esc(s&&s.t||'')+'">'+
      '<label>Mail</label><input id="m-m" value="'+esc(s&&s.m||'')+'">'+
      '<label>Localidad</label><input id="m-l" value="'+esc(s&&s.l||'')+'">'+
      '<label>Importe (€)</label><input type="number" id="m-i" value="'+(s&&s.i||0)+'">'+
      '<label>Estado pago</label><select id="m-p">'+pagoOpts+'</select>'+
      '<label>Observaciones</label><textarea id="m-o">'+esc(s&&s.o||'')+'</textarea>';
    if(isEdit) left.innerHTML='<button class="btn-danger" onclick="delS('+sY+',\''+sM+'\',\''+_ex.cid+'\','+_ex.idx+');closeModal()">Eliminar</button>';
  }
  document.getElementById('modal').style.display='flex';
}

// ── confirmModal ──────────────────────────────────────────────────────────────
function confirmModal(){
  if(_mode==='year'){
    var y=parseInt(gv('m-year'));
    if(!y||YEARS.indexOf(y)>=0){alert('Año inválido o ya existe');return;}
    YEARS.push(y);YEARS.sort(function(a,b){return a-b;});
    sY=y;sM='Enero';selPro=null;
    if(!MC[y])MC[y]={};if(!ST[y])ST[y]={};
  }
  else if(_mode==='month'){
    var mo=gv('m-month');if(!mo)return;
    if(!MC[sY])MC[sY]={};if(!MC[sY][mo])MC[sY][mo]=[];
    if(!ST[sY])ST[sY]={};if(!ST[sY][mo])ST[sY][mo]={};
    sM=mo;
  }
  else if(_mode==='course'){
    var lab=gv('m-cl');if(!lab){alert('Nombre obligatorio');return;}
    var col=getColor();var id='c'+Date.now();
    if(!MC[sY])MC[sY]={};if(!MC[sY][sM])MC[sY][sM]=[];
    MC[sY][sM].push({id:id,label:lab,cls:col.cls,pill:col.pill,subtitle:gv('m-csub')});
    if(!ST[sY])ST[sY]={};if(!ST[sY][sM])ST[sY][sM]={};ST[sY][sM][id]=[];
  }
  else if(_mode==='edit-course'){
    var c=gM(sY,sM)[_ex.idx];var col=getColor();
    c.label=gv('m-cl');c.cls=col.cls;c.pill=col.pill;c.subtitle=gv('m-csub');
  }
  else if(_mode==='student'){
    var cid=gv('m-sc')||_ex.cid;
    var n=gv('m-n');if(!n){alert('Nombre obligatorio');return;}
    if(!ST[sY])ST[sY]={};if(!ST[sY][sM])ST[sY][sM]={};if(!ST[sY][sM][cid])ST[sY][sM][cid]=[];
    ST[sY][sM][cid].push({n:n,ap:gv('m-ap'),t:gv('m-t'),m:gv('m-m'),l:gv('m-l'),i:parseInt(gv('m-i'))||0,p:gv('m-p'),o:gv('m-o')});
  }
  else if(_mode==='edit-student'){
    var s=ST[sY][sM][_ex.cid][_ex.idx];
    Object.assign(s,{n:gv('m-n'),ap:gv('m-ap'),t:gv('m-t'),m:gv('m-m'),l:gv('m-l'),i:parseInt(gv('m-i'))||0,p:gv('m-p'),o:gv('m-o')});
  }
  else if(_mode==='add-pro-s'||_mode==='edit-pro-s'){
    var pk=_ex.pk,cid=_ex.cid,idx=_ex.idx;
    var n=gv('m-n');if(!n){alert('Nombre obligatorio');return;}
    var tu=document.getElementById('btn-am').classList.contains('sel')?'Mañana':document.getElementById('btn-pm').classList.contains('sel')?'Tarde':'';
    var pm={};MO_ORDER.forEach(function(mo){var v=gv('m-pm-'+mo);if(v)pm[mo]=parseInt(v)||0;});
    var obj={n:n,ap:gv('m-ap'),t:gv('m-t'),m:gv('m-m'),l:gv('m-l'),ma:parseInt(gv('m-ma'))||0,tu:tu,cu:gv('m-cu'),p:gv('m-p'),pm:pm,o:gv('m-o')};
    if(!PS[pk])PS[pk]={};if(!PS[pk][cid])PS[pk][cid]=[];
    if(_mode==='add-pro-s')PS[pk][cid].push(obj);
    else PS[pk][cid][idx]=obj;
  }
  closeModal();render();
}

// ── Delete ────────────────────────────────────────────────────────────────────
function delCourse(idx){
  if(!confirm('¿Eliminar este curso y todos sus alumnos?'))return;
  var cid=gM(sY,sM)[idx].id;
  MC[sY][sM].splice(idx,1);
  if(ST[sY]&&ST[sY][sM])delete ST[sY][sM][cid];
  render();
}
function delS(y,m,cid,idx){
  if(!confirm('¿Eliminar este alumno?'))return;
  ST[y][m][cid].splice(idx,1);
  document.getElementById('detail-ov').style.display='none';
  render();
}
function editS(y,m,cid,idx){openModal('edit-student',{cid:cid,idx:idx});}
function delPS(pk,cid,idx){
  if(!confirm('¿Eliminar este alumno?'))return;
  PS[pk][cid].splice(idx,1);
  document.getElementById('detail-ov').style.display='none';
  render();
}
function editPS(ev,pk,cid,idx){if(ev)ev.stopPropagation();selPro=pk;openModalProS(pk,cid,idx);}

// ── Main render ───────────────────────────────────────────────────────────────
function toggleDB(){
  showDB=!showDB;
  document.getElementById('db-btn').className='db-btn'+(showDB?'':' off');
  document.getElementById('db-search').style.display=showDB?'block':'none';
  if(showDB)selPro=null;
  render();
}
function render(){
  scheduleSave();
  renderNav();
  renderMobileNav();
  if(showDB)renderDB();
  else if(selPro)renderPro();
  else renderMonth();
}
render();


async function loadFromSupabase(){
  if(typeof supabase==='undefined')return;
  try{
    var r=await getDB().from('app_data').select('*').eq('id','main').single();
    if(r.error&&r.error.code!=='PGRST116')return;
    if(r.data){
      if(r.data.years&&r.data.years.length)YEARS.splice(0,YEARS.length,...r.data.years);
      if(r.data.mc)Object.keys(r.data.mc).forEach(function(k){MC[parseInt(k)||k]=r.data.mc[k];});
      if(r.data.st)Object.keys(r.data.st).forEach(function(k){ST[parseInt(k)||k]=r.data.st[k];});
      if(r.data.pc)Object.assign(PC,r.data.pc);
      if(r.data.ps)Object.assign(PS,r.data.ps);
    }
    _supaLoaded=true;
    showStatus('✅ Conectado','ok');
    setTimeout(function(){showStatus('','');},3000);
  }catch(e){}
}
async function saveToSupabase(){
  if(!_supaLoaded)return;
  try{
    var r=await getDB().from('app_data').upsert({id:'main',years:YEARS,mc:MC,st:ST,pc:PC,ps:PS,updated_at:new Date().toISOString()},{onConflict:'id'});
    if(!r.error){showStatus('☁️ Guardado','ok');setTimeout(function(){showStatus('','');},2000);}
  }catch(e){}
}
function scheduleSave(){clearTimeout(_saveTimer);_saveTimer=setTimeout(saveToSupabase,1500);}
function showStatus(msg,type){var el=document.getElementById('cloud-status');if(!el)return;el.textContent=msg;el.className='cloud-status '+(type||'');}

function renderMobileNav(){
  if(window.innerWidth>700)return;
  var ySel=document.getElementById('mn-year');
  var mSel=document.getElementById('mn-month');
  var dbBtn=document.getElementById('mn-db-btn');
  if(!ySel)return;
  ySel.innerHTML='';
  YEARS.forEach(function(y){
    if(!(MC[y]&&Object.keys(MC[y]).length))return;
    var o=document.createElement('option');
    o.value=y;o.textContent=y;
    if(!selPro&&y===sY)o.selected=true;
    ySel.appendChild(o);
  });
  PRO_KEYS.forEach(function(pk){
    if(!(PC[pk]&&PC[pk].length))return;
    var o=document.createElement('option');
    o.value='pro:'+pk;o.textContent=pk;
    if(selPro===pk)o.selected=true;
    ySel.appendChild(o);
  });
  mSel.innerHTML='';
  if(selPro){mSel.style.display='none';}
  else{
    mSel.style.display='';
    ALL_MONTHS.filter(function(m){return MC[sY]&&MC[sY][m];}).forEach(function(m){
      var o=document.createElement('option');
      o.value=m;o.textContent=m;
      if(m===sM)o.selected=true;
      mSel.appendChild(o);
    });
  }
  if(dbBtn)dbBtn.className=showDB?'active':'';
}
function mnSetYear(v){
  if(v.indexOf('pro:')===0){selPro=v.slice(4);showDB=false;}
  else{sY=parseInt(v);selPro=null;showDB=false;sM=ALL_MONTHS.filter(function(m){return MC[sY]&&MC[sY][m];})[0]||'Enero';}
  render();
}
function mnSetMonth(v){sM=v;render();}
function mnToggleDB(){showDB=!showDB;if(showDB)selPro=null;render();}

</script>
