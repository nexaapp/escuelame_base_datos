<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escuela M.E.</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  width:100%;height:100%;
  background-color:#ffffff !important;
  font-family:'Montserrat',sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* Logo — background matches page so white PNG corners disappear */
.logo{
  width:52px;height:52px;
  border-radius:50%;
  object-fit:cover;
  display:block;
  background:#ffffff;
  margin-bottom:56px;
}

/* Hello + input on the same line, centered */
.row{
  display:flex;
  align-items:center;
  gap:18px;
}

.hello{
  font-size:clamp(48px,8vw,72px);
  font-weight:800;
  color:#1a1a1a;
  letter-spacing:-.03em;
  line-height:1;
}

.field{position:relative;display:flex;align-items:center}

input{
  height:56px;
  width:clamp(180px,20vw,260px);
  padding:0 48px 0 22px;
  border:1.5px solid #c8c7c2;
  border-radius:100px;
  font-size:14px;
  font-family:'Montserrat',sans-serif;
  font-weight:600;
  color:#1a1a1a;
  background:rgba(255,255,255,.55);
  outline:none;
  letter-spacing:.1em;
  transition:border-color .2s,box-shadow .2s,background .2s;
  -webkit-appearance:none;
}

input:focus{
  border-color:#fc5248;
  background:rgba(255,255,255,.9);
  box-shadow:0 0 0 4px rgba(252,82,72,.1);
}

input::placeholder{
  color:#bbb;
  letter-spacing:.04em;
  font-size:13px;
  font-weight:500;
}

.eye{
  position:absolute;right:16px;
  background:none;border:none;cursor:pointer;
  color:#bbb;display:flex;align-items:center;
  transition:color .15s;padding:0;
}
.eye:hover{color:#555}
.eye svg{
  width:18px;height:18px;
  stroke-width:1.8;fill:none;stroke:currentColor;
  stroke-linecap:round;stroke-linejoin:round;
}

/* Error toast */
.err{
  position:fixed;bottom:36px;left:50%;
  transform:translateX(-50%);
  display:none;
  padding:10px 22px;
  background:white;
  border:1.5px solid rgba(252,82,72,.25);
  border-radius:100px;
  font-size:12px;color:#c0392b;font-weight:600;
  align-items:center;gap:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  animation:up .2s ease;white-space:nowrap;
}
.err.show{display:flex}

@keyframes up{
  from{opacity:0;transform:translateX(-50%) translateY(6px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* Mobile */
@media(max-width:500px){
  .row{flex-direction:row;gap:12px}
  .hello{font-size:42px}
  input{width:160px;font-size:13px}
}
</style>
</head>

  clearTimeout(window._t);
