<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escuela M.E.</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#ffffff;font-family:'Montserrat',sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo{width:52px;height:52px;border-radius:50%;object-fit:cover;display:block;background:#ffffff;margin-bottom:64px}
.tools{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px;padding:0 24px}
.tool-btn{display:flex;align-items:center;gap:16px;padding:18px 24px;border:1.5px solid #e8e8e8;border-radius:100px;background:rgba(255,255,255,.6);cursor:pointer;text-decoration:none;color:#1a1a1a;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em;transition:border-color .2s,box-shadow .2s,background .2s,transform .15s;width:100%;text-align:left}
.tool-btn:hover{border-color:#fc5248;background:#ffffff;box-shadow:0 0 0 4px rgba(252,82,72,.08);transform:translateX(4px)}
.tool-btn .icon{width:36px;height:36px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.tool-btn:hover .icon{background:#fff1f0}
.tool-btn .icon svg{width:16px;height:16px;stroke:#888;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.tool-btn:hover .icon svg{stroke:#fc5248}
.tool-btn .label{flex:1}
.tool-btn .arrow{color:#ccc;font-size:16px;transition:color .2s,transform .2s}
.tool-btn:hover .arrow{color:#fc5248;transform:translateX(2px)}
.logout{position:fixed;bottom:36px;right:36px;background:none;border:none;cursor:pointer;font-size:11px;font-family:'Montserrat',sans-serif;font-weight:600;color:#ccc;letter-spacing:.06em;text-transform:uppercase;transition:color .15s}
.logout:hover{color:#888}
</style>
</head>
